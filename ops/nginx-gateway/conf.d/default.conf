limit_req_zone $binary_remote_addr zone=scratch_api:10m rate=10r/s;

resolver 127.0.0.11 ipv6=off valid=30s;
resolver_timeout 5s;

upstream cc_service {
  zone cc_service 64k;
  server cc-service:5000 resolve;
}

upstream bb_service {
  zone bb_service 64k;
  server warehouse-nginx:80 resolve;
}

server {
  listen 80;
  server_name scratch-app.hchch.tech;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 80;
  server_name warehouse.hchch.tech;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name scratch-app.hchch.tech;

  ssl_certificate     /etc/letsencrypt/live/scratch-app.hchch.tech/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/scratch-app.hchch.tech/privkey.pem;

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  client_max_body_size 20m;

  location / {
    limit_req zone=scratch_api burst=20 nodelay;
    proxy_pass http://cc_service;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name warehouse.hchch.tech;

  ssl_certificate     /etc/letsencrypt/live/warehouse.hchch.tech/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/warehouse.hchch.tech/privkey.pem;

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  client_max_body_size 20m;

  location / {
    proxy_pass http://bb_service;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
  }
}
